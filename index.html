<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的行事曆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; background: #FFFCF2; }
        .calendar-cell { transition: all 0.1s ease; min-height: 78px; padding: 6px; border: 1px solid #E8E3FF; font-size: 13px; }
        .calendar-cell:hover { transform: translateY(-1px); border-color: #EF8275 !important; border-width: 2px; }
        .event-pill { font-size: 10px; padding: 1px 5px; border-radius: 5px; margin-bottom: 1px; }
        .view-btn { background-color: #4F97E9; color: #FFFCF2; font-size: 13px; }
        .view-btn.active { background-color: #2C2C54 !important; color: #E8E3FF !important; font-weight: 600; }
        .holiday-badge, .lunar-badge { 
            font-size: 9px; padding: 1px 5px; border-radius: 4px; 
            background: #EF8275; color: #FFFCF2; font-weight: 600; display: inline-block;
        }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <div id="sidebar" class="sidebar w-72 bg-white border-r border-slate-200 flex flex-col flex-shrink-0 md:relative fixed z-50 transform -translate-x-full md:transform-none transition-transform">
            <div id="user-info" class="px-5 py-4 border-b hidden">
                <div class="flex items-center gap-x-3">
                    <img id="user-avatar" class="w-10 h-10 rounded-full object-cover" alt="">
                    <div class="flex-1 min-w-0">
                        <div id="user-name" class="font-semibold text-sm truncate"></div>
                    </div>
                    <button onclick="signOut()" class="text-red-500"><i class="fa-solid fa-sign-out-alt"></i></button>
                </div>
            </div>
            <div class="px-5 pt-5 space-y-2">
                <button onclick="openTripModal()" class="w-full py-3 text-white rounded-2xl text-sm font-semibold" style="background:#4F97E9;">新增行程</button>
                <button id="google-login-btn" onclick="signInWithGoogle()" class="w-full py-2.5 bg-white border border-[#E8E3FF] rounded-2xl text-sm">使用 Google 登入</button>
            </div>
        </div>

        <div class="flex-1 flex flex-col min-w-0">
            <div class="p-4 border-b bg-white flex items-center justify-between">
                <button onclick="toggleMobileSidebar()" class="md:hidden"><i class="fa-solid fa-bars"></i></button>
                <div class="flex items-center gap-2">
                    <button onclick="prevPeriod()" class="px-3 py-1"><i class="fa-solid fa-chevron-left"></i></button>
                    <div id="period-title" onclick="goToday()"></div>
                    <button onclick="nextPeriod()" class="px-3 py-1"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
                <div class="flex gap-2">
                    <button onclick="switchView('month')" id="btn-month" class="view-btn px-3 py-1 rounded">月</button>
                </div>
            </div>
            <div class="flex-1 p-4 overflow-auto" id="calendar-content"></div>
        </div>
    </div>

    <script>
        // 初始化 Supabase
        const supabase = window.supabase.createClient('https://qemfwpdkhbbqnxrcmuyi.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlbWZ3cGRraGJicW54cmNtdXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjQzNTUsImV4cCI6MjA5Nzk0MDM1NX0.e66XIq1JTjHcQRUAWkKDZKA3pFHOsRX_pLbS-yK74Gg');

        // 綁定全域變數
        window.signInWithGoogle = async () => {
            await supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: 'https://austing2021-debug.github.io/calendar/' } });
        };

        window.signOut = async () => {
            await supabase.auth.signOut();
            location.reload();
        };

        window.toggleMobileSidebar = () => {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        };

        window.prevPeriod = () => { /* 實作邏輯 */ };
        window.nextPeriod = () => { /* 實作邏輯 */ };
        window.goToday = () => { /* 實作邏輯 */ };
        window.switchView = (view) => { /* 實作邏輯 */ };
        window.openTripModal = () => { document.getElementById('trip-modal').classList.remove('hidden'); };
        window.closeTripModal = () => { document.getElementById('trip-modal').classList.add('hidden'); };
        window.handleTripFormSubmit = (e) => { e.preventDefault(); alert('儲存成功'); };

        // 頁面初始化
        window.onload = async () => {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                document.getElementById('google-login-btn').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('user-name').textContent = user.email;
            }
        };
    </script>
</body>
</html>
