<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的行事曆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <style>
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; background: #FFFCF2; overflow: hidden; }
        
        /* 月曆格子基礎樣式 */
        .calendar-cell { transition: all 0.15s ease; cursor: pointer; border-right: 1px solid #E8E3FF; border-bottom: 1px solid #E8E3FF; }
        
        /* 月曆背景顏色邏輯 */
        .bg-other-month { background-color: #edf9f9; opacity: 0.5; } /* 增加霧面透明度區分 */
        .bg-current-weekend { background-color: #FCF4F4; }
        .bg-current-weekday { background-color: #fafafa; }
        
        /* 今天與 Hover 效果 */
        .is-today { box-shadow: inset 0 0 0 2px #4F97E9; }
        /* Hover 只改變框線顏色，不改變背景色與文字顏色 */
        .calendar-cell:hover:not(.is-today) { box-shadow: inset 0 0 0 2px #ef8275; }
        
        /* 行程標籤樣式 */
        .event-pill { font-size: 11px; padding: 2px 4px; margin-bottom: 2px; cursor: pointer; height: 20px; display: flex; align-items: center; overflow: hidden; }
        
        /* 週曆的時間網格樣式 */
        .time-grid-bg { background-image: linear-gradient(#E8E3FF 1px, transparent 1px); background-size: 100% 60px; }
        .time-slot { height: 60px; border-bottom: 1px solid transparent; }
        
        /* 視圖切換膠囊按鈕 */
        .view-group { background: #ffffff; border: 1px solid #4F97E9; padding: 3px; border-radius: 30px; display: flex; }
        .view-btn { padding: 4px 18px; border-radius: 20px; color: #4F97E9; font-weight: 600; font-size: 14px; background: transparent; transition: all 0.2s; }
        .view-btn.active { background: #4F97E9 !important; color: #ffffff !important; }
        
        /* 節日與農曆標籤 */
        .holiday-badge { font-size: 10px; padding: 2px 6px; border-radius: 6px; background: #EF8275; color: #ffffff; font-weight: 600; display: inline-block; }
        .lunar-badge { font-size: 10px; padding: 2px 6px; border-radius: 6px; background: #EFCB4B; color: #ffffff; font-weight: 600; display: inline-block; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #E8E3FF; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- Top Bar -->
    <div class="h-16 border-b bg-white px-4 md:px-6 flex items-center justify-between flex-shrink-0 z-40 relative shadow-sm">
        <!-- Left: Menu & Logo -->
        <div class="flex items-center gap-x-4">
            <button onclick="toggleSidebar()" class="w-10 h-10 flex items-center justify-center text-[#2C2C54] border-2 border-[#2C2C54] rounded-full hover:bg-slate-50 transition">
                <i class="fa-solid fa-bars text-lg"></i>
            </button>
            <div class="hidden sm:flex items-center gap-x-2">
                <div class="w-9 h-9 rounded-xl flex items-center justify-center bg-[#2C2C54]">
                    <i class="fa-solid fa-calendar text-white"></i>
                </div>
                <h1 class="text-xl font-bold text-[#2C2C54] tracking-tight">行事曆</h1>
            </div>
        </div>

        <!-- Center: Controls -->
        <div class="flex items-center gap-x-3 md:gap-x-4 absolute left-1/2 transform -translate-x-1/2">
            <!-- 視圖切換 -->
            <div class="view-group hidden md:flex">
                <button onclick="switchView('week')" id="btn-week" class="view-btn">週</button>
                <button onclick="switchView('month')" id="btn-month" class="view-btn active">月</button>
                <button onclick="switchView('year')" id="btn-year" class="view-btn">年</button>
            </div>
            <!-- 月份選擇器 -->
            <div class="flex items-center bg-[#4F97E9] rounded-[24px] p-1 shadow-sm">
                <button onclick="prevPeriod()" class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-white/20 transition text-white">
                    <i class="fa-solid fa-chevron-left text-sm"></i>
                </button>
                <div id="period-title" class="px-3 font-bold text-[15px] text-white min-w-[110px] text-center cursor-pointer tracking-wide" onclick="goToday()"></div>
                <button onclick="nextPeriod()" class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-white/20 transition text-white">
                    <i class="fa-solid fa-chevron-right text-sm"></i>
                </button>
            </div>
            <!-- 今天按鈕 -->
            <button onclick="goToday()" class="hidden sm:block px-4 py-1.5 text-sm border border-[#E8E3FF] rounded-full text-[#2C2C54] hover:bg-slate-50 transition font-medium">
                今天
            </button>
        </div>

        <!-- Right: User Profile -->
        <div class="flex items-center gap-x-3">
            <!-- 未登入 -->
            <button id="google-login-btn" onclick="signInWithGoogle()" class="flex items-center gap-x-2 px-3 py-1.5 bg-white border border-[#E8E3FF] rounded-full text-sm font-semibold text-[#2C2C54] hover:bg-slate-50 transition">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4 h-4">
                <span class="hidden sm:inline">登入</span>
            </button>
            <!-- 已登入 -->
            <div id="header-logged-in" class="hidden items-center gap-x-2 relative group cursor-pointer">
                <div class="hidden md:block text-sm font-bold text-[#2C2C54] text-right">
                    <div id="header-name" class="leading-tight"></div>
                </div>
                <img id="header-avatar" class="w-9 h-9 rounded-full object-cover border border-slate-200" alt="">
                <button onclick="signOut()" class="absolute top-10 right-0 w-max text-red-500 opacity-0 group-hover:opacity-100 transition px-3 py-2 bg-white shadow-lg border rounded-lg text-sm font-bold z-50">
                    登出
                </button>
            </div>
        </div>
    </div>

    <!-- Layout Wrapper -->
    <div class="flex-1 flex overflow-hidden relative">
        
        <!-- Sidebar (改為絕對定位的側滑抽屜，不推擠主畫面) -->
        <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-40 hidden transition-opacity"></div>
        <div id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white shadow-2xl z-50 flex flex-col transform -translate-x-full transition-transform duration-300">
            <!-- 增加關閉按鈕供手機版操作 -->
            <div class="flex justify-end p-3 border-b md:hidden">
                <button onclick="toggleSidebar()" class="text-slate-400 hover:text-slate-600 px-2 py-1"><i class="fa-solid fa-times text-xl"></i></button>
            </div>
            
            <div class="flex-1 overflow-y-auto min-h-0 flex flex-col pt-5">
                <!-- My Calendars -->
                <div id="calendar-lists-container" class="px-5 hidden flex-col">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[13px] font-bold text-slate-500">我的行事曆本</span>
                        <div class="flex gap-2">
                            <button onclick="createNewCalendar()" class="text-[#4F97E9] hover:bg-blue-50 px-1.5 py-1 rounded text-xs transition font-semibold">
                                <i class="fa-solid fa-plus"></i> 新增
                            </button>
                            <button onclick="toggleEditCalendars()" id="edit-cal-btn" class="text-slate-400 hover:text-slate-600 px-1.5 py-1 rounded text-xs transition font-semibold">
                                <i class="fa-solid fa-pen"></i> 編輯
                            </button>
                        </div>
                    </div>
                    <div id="my-calendars-list" class="space-y-1.5 mb-6"></div>
                    
                    <!-- Add Trip Button -->
                    <button id="add-trip-btn" onclick="openTripModal()" class="w-full py-3 text-white rounded-xl text-[15px] font-bold shadow-sm hover:opacity-90 transition" style="background:#4F97E9;">
                        <i class="fa-solid fa-plus mr-1"></i> 新增行程
                    </button>
                </div>

                <div class="mx-5 my-5 border-b border-slate-100 border-dashed"></div>

                <!-- Recent Upcoming Activities -->
                <div id="upcoming-container" class="px-5 pb-6 hidden flex-1">
                    <div class="text-[13px] font-bold text-slate-500 mb-3 flex items-center justify-between">
                        <span>近期活動 (30天內)</span>
                        <span id="upcoming-count" class="bg-[#EF8275] text-white px-2 py-0.5 rounded-full text-[10px]">0</span>
                    </div>
                    <div id="upcoming-list" class="space-y-3"></div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0 relative bg-[#FFFCF2] z-10">
            <div id="loading-overlay" class="hidden absolute inset-0 bg-white/80 z-50 flex items-center justify-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#4F97E9]"></div>
            </div>

            <div class="flex-1 p-2 sm:p-4 md:p-6 overflow-hidden flex flex-col">
                <div class="max-w-[1400px] mx-auto w-full h-full flex flex-col" id="calendar-content"></div>
            </div>
        </div>
    </div>

    <!-- Right Side Detail Panel -->
    <div id="day-detail-panel" class="fixed right-0 top-0 bottom-0 w-full md:w-[380px] bg-white shadow-2xl border-l transform translate-x-full transition-transform duration-300 z-50 flex flex-col">
        <div class="p-5 border-b flex justify-between items-center bg-white z-10">
            <div class="font-bold text-[19px] text-[#2C2C54] flex items-center gap-3" id="detail-date-title"></div>
            <button onclick="closeDayDetail()" class="text-slate-400 hover:text-slate-600 text-xl px-2 transition-colors"><i class="fa-solid fa-times"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-5 space-y-4 bg-[#FFFCF2]" id="detail-events-list"></div>
        <div class="p-5 bg-white border-t z-10">
            <button onclick="openTripModalFromDetail()" class="w-full py-3.5 text-white rounded-[14px] font-bold text-[15px] shadow-sm hover:opacity-90 transition" style="background:#4F97E9;">在此日期新增行程</button>
        </div>
    </div>

    <!-- 右側面板霧面背景 Overlay -->
    <div id="detail-overlay" onclick="closeDayDetail()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 hidden transition-opacity duration-300 cursor-pointer"></div>

    <!-- Trip Modal -->
    <div id="trip-modal" onclick="if (event.target.id === 'trip-modal') closeTripModal()" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-end md:items-center justify-center p-0 md:p-4 transition-opacity">
        <div onclick="event.stopImmediatePropagation()" class="bg-white w-full md:w-[520px] md:rounded-3xl shadow-2xl border md:border-0 rounded-t-3xl max-h-[92vh] overflow-y-auto">
            <div class="px-5 pt-5 pb-4 flex justify-between items-center border-b md:border-0 sticky top-0 bg-white z-10">
                <h3 id="modal-title" class="text-2xl font-semibold text-[#2C2C54]">新增行程</h3>
                <button onclick="closeTripModal()" class="text-2xl text-slate-400 hover:text-slate-600 transition-colors">×</button>
            </div>
            <!-- 表單綁定 handleTripFormSubmit -->
            <form id="trip-form" onsubmit="handleTripFormSubmit(event)" class="p-5 space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1.5 text-[#2C2C54]">行程標題 <span class="text-red-500">*</span></label>
                    <input type="text" id="trip-title" required class="w-full px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9] outline-none transition" placeholder="例如：產品開發會議">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1.5 text-[#2C2C54]">開始日期</label>
                        <input type="date" id="start-date" required class="w-full px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9] outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1.5 text-[#2C2C54]">開始時間 (留白為全天)</label>
                        <input type="time" id="start-time" class="w-full px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9] outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1.5 text-[#2C2C54]">結束日期</label>
                        <input type="date" id="end-date" class="w-full px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9] outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1.5 text-[#2C2C54]">結束時間</label>
                        <input type="time" id="end-time" class="w-full px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9] outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1.5 text-[#2C2C54]">地點</label>
                    <input type="text" id="location" placeholder="例如：台北信義區" class="w-full px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9] outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2 text-[#2C2C54]">顏色標記</label>
                    <div class="flex flex-wrap gap-3" id="color-picker"></div>
                </div>
                <div class="flex gap-3 pt-3 sticky bottom-0 bg-white pb-2 border-t mt-4">
                    <button type="button" id="delete-trip-btn" onclick="deleteTrip()" class="hidden w-12 flex items-center justify-center py-3 border border-red-200 text-red-500 rounded-2xl hover:bg-red-50 transition-colors"><i class="fa-solid fa-trash"></i></button>
                    <button type="button" onclick="closeTripModal()" class="flex-1 py-3 border border-[#E8E3FF] rounded-2xl text-[#2C2C54] hover:bg-slate-50 transition-colors font-medium">取消</button>
                    <!-- type="submit" 確保表單可送出 -->
                    <button type="submit" id="save-trip-btn" class="flex-1 py-3.5 text-white rounded-2xl font-semibold shadow-sm hover:opacity-90 transition-opacity bg-[#4F97E9]">儲存</button>
                </div>
            </form>
        </div>
    </div>
