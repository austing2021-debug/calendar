<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的行事曆</title>
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="我的行事曆">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
    <style>
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; background: #FFFCF2; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .calendar-cell { transition: box-shadow 0.15s ease; cursor: pointer; border-right: 1px solid #E8E3FF; border-bottom: 1px solid #E8E3FF; }
        .bg-other-month { background-color: #edf9f9; opacity: 0.5; } 
        .bg-current-weekend { background-color: #FCF4F4; opacity: 1; }
        .bg-current-weekday { background-color: #fafafa; opacity: 1; }
        
        .is-today { box-shadow: inset 0 0 0 2px #4F97E9; }
        .calendar-cell:hover:not(.is-today) { box-shadow: inset 0 0 0 2px #ef8275; z-index: 10; position: relative; }
        
        .event-pill { font-size: 11px; padding: 2px 4px; margin-bottom: 2px; cursor: pointer; min-height: 20px; display: flex; align-items: center; overflow: hidden; }
        .time-grid-bg { background-image: linear-gradient(#E8E3FF 1px, transparent 1px); background-size: 100% 60px; }
        .time-slot { height: 60px; border-bottom: 1px solid transparent; }
        
        .view-group { background: #ffffff; border: 1px solid #4F97E9; padding: 2px; border-radius: 30px; display: flex; }
        .view-btn { padding: 4px 16px; border-radius: 20px; color: #4F97E9; font-weight: 600; font-size: 14px; background: transparent; transition: all 0.2s; }
        .view-btn.active { background: #4F97E9 !important; color: #ffffff !important; }
        
        .holiday-badge { font-size: 10px; padding: 1px 4px; border-radius: 4px; background: #F0958B; color: #ffffff; font-weight: 600; display: inline-block; white-space: nowrap; }
        .lunar-badge { font-size: 10px; padding: 1px 4px; border-radius: 4px; background: #ffffff; color: #000000; font-weight: 600; display: inline-block; white-space: nowrap; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #E8E3FF; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden w-full max-w-full">

    <div class="h-14 md:h-16 border-b bg-white px-2 md:px-6 flex items-center justify-between flex-shrink-0 z-40 relative shadow-sm w-full gap-2">
        <div class="flex items-center gap-x-1.5 md:gap-x-2 flex-shrink-0 z-10">
            <button onclick="toggleSidebar()" class="w-8 h-8 md:w-10 md:h-10 flex items-center justify-center text-[#2C2C54] border-2 border-[#2C2C54] rounded-full hover:bg-slate-50 transition">
                <i class="fa-solid fa-bars text-[13px] md:text-lg"></i>
            </button>
            <div class="hidden sm:flex items-center gap-x-2">
                <div class="w-9 h-9 rounded-xl flex items-center justify-center bg-[#2C2C54]">
                    <i class="fa-solid fa-calendar text-white"></i>
                </div>
                <h1 class="text-xl font-bold text-[#2C2C54] tracking-tight">行事曆</h1>
            </div>
        </div>

        <div class="flex items-center justify-center gap-x-1.5 md:gap-x-3 flex-1 min-w-0 overflow-x-auto no-scrollbar">
            <div class="view-group flex flex-shrink-0">
                <button onclick="switchView('week')" id="btn-week" class="view-btn px-2.5 md:px-4 py-0.5 md:py-1 text-[11px] md:text-sm">週</button>
                <button onclick="switchView('month')" id="btn-month" class="view-btn active px-2.5 md:px-4 py-0.5 md:py-1 text-[11px] md:text-sm">月</button>
                <button onclick="switchView('year')" id="btn-year" class="view-btn px-2.5 md:px-4 py-0.5 md:py-1 text-[11px] md:text-sm">年</button>
            </div>
            <div class="flex items-center bg-[#4F97E9] rounded-[24px] p-[2px] md:p-1 shadow-sm flex-shrink-0">
                <button onclick="prevPeriod()" class="w-6 h-6 md:w-7 md:h-7 flex items-center justify-center flex-shrink-0 rounded-full hover:bg-white/20 transition text-white">
                    <i class="fa-solid fa-chevron-left text-[10px] md:text-sm"></i>
                </button>
                <div id="period-title" class="px-1.5 md:px-3 font-bold text-[13px] md:text-[15px] text-white min-w-[65px] md:min-w-[110px] text-center cursor-pointer tracking-tight md:tracking-wide truncate" onclick="goToday()"></div>
                <button onclick="nextPeriod()" class="w-6 h-6 md:w-7 md:h-7 flex items-center justify-center flex-shrink-0 rounded-full hover:bg-white/20 transition text-white">
                    <i class="fa-solid fa-chevron-right text-[10px] md:text-sm"></i>
                </button>
            </div>
            <button onclick="goToday()" class="hidden md:block px-3 py-1 text-sm border border-[#E8E3FF] rounded-full text-[#2C2C54] hover:bg-slate-50 transition font-medium flex-shrink-0">今天</button>
        </div>

        <div class="flex items-center flex-shrink-0 z-10">
            <button id="google-login-btn" onclick="signInWithGoogle()" class="flex items-center gap-x-1 px-2.5 py-1.5 bg-white border border-[#E8E3FF] rounded-full text-xs font-semibold text-[#2C2C54] hover:bg-slate-50 transition">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-3.5 h-3.5">
                <span class="hidden sm:inline">登入</span>
            </button>
            <div id="header-logged-in" class="hidden items-center gap-x-2 relative cursor-pointer" onclick="toggleProfileMenu(event)">
                <div class="hidden md:block text-sm font-bold text-[#2C2C54] text-right"><div id="header-name" class="leading-tight"></div></div>
                <img id="header-avatar" class="w-8 h-8 md:w-9 md:h-9 rounded-full object-cover border border-slate-200" alt="">
                <button id="profile-menu" onclick="signOut()" class="absolute top-12 right-0 w-max text-red-500 hidden transition px-4 py-2.5 bg-white shadow-xl border border-slate-100 rounded-xl text-sm font-bold z-50">
                    <i class="fa-solid fa-sign-out-alt mr-1"></i> 登出切換帳號
                </button>
            </div>
        </div>
    </div>

    <div class="flex-1 flex overflow-hidden w-full relative">
        <div id="sidebar-overlay" onclick="toggleSidebar()" class="md:hidden absolute inset-0 bg-slate-900/20 backdrop-blur-sm z-20 hidden transition-opacity"></div>
        
        <div id="sidebar" class="absolute md:relative inset-y-0 left-0 w-64 bg-white md:shadow-none shadow-2xl z-30 flex flex-col transform -translate-x-full md:translate-x-0 transition-transform duration-300 border-r border-slate-200 flex-shrink-0">
            <div class="flex justify-between items-center p-4 border-b md:hidden">
                <h2 class="font-bold text-[#2C2C54]">選單</h2>
                <button onclick="toggleSidebar()" class="text-slate-400 hover:text-slate-600 px-2 py-1"><i class="fa-solid fa-times text-xl"></i></button>
            </div>
            
            <div class="flex-1 overflow-y-auto min-h-0 flex flex-col pt-5 no-scrollbar">
                <div id="calendar-lists-container" class="px-5 hidden flex-col">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[13px] font-bold text-slate-500">我的行事曆本</span>
                        <div class="flex gap-1">
                            <button onclick="createNewCalendar()" class="flex items-center gap-1 text-[#4F97E9] hover:bg-blue-50 px-1.5 py-1 rounded text-xs transition font-semibold whitespace-nowrap"><i class="fa-solid fa-plus"></i> 新增</button>
                            <button onclick="toggleEditCalendars()" id="edit-cal-btn" class="flex items-center gap-1 text-slate-400 hover:text-slate-600 px-1.5 py-1 rounded text-xs transition font-semibold whitespace-nowrap"><i class="fa-solid fa-pen"></i> 編輯</button>
                            <button onclick="generateShareLink()" class="flex items-center gap-1 text-emerald-500 hover:bg-emerald-50 px-1.5 py-1 rounded text-xs transition font-semibold whitespace-nowrap"><i class="fa-solid fa-link"></i> 共用</button>
                        </div>
                    </div>
                    <div id="my-calendars-list" class="space-y-1.5 mb-6"></div>
                    
                    <button id="add-trip-btn" onclick="openTripModal()" class="w-full py-3 text-white rounded-xl text-[15px] font-bold shadow-sm hover:opacity-90 transition" style="background:#4F97E9;">
                        <i class="fa-solid fa-plus mr-1"></i> 新增行程
                    </button>
                    <button id="sync-google-btn" onclick="syncGoogleCalendar()" class="w-full mt-2 py-2.5 text-[#2C2C54] border border-[#E8E3FF] rounded-xl text-[13px] font-bold shadow-sm hover:bg-slate-50 transition">
                        <i class="fa-brands fa-google text-red-500 mr-1"></i> 同步 Google 日曆
                    </button>
                </div>

                <div class="mx-5 my-5 border-b border-slate-100 border-dashed flex-shrink-0"></div>

                <div class="px-5 pb-6 flex flex-col space-y-8 flex-shrink-0">
                    <div id="upcoming-container" class="hidden flex-col">
                        <div class="text-[14px] font-bold text-slate-500 mb-3 flex items-center justify-between">
                            <div class="flex items-center">
                                <span>近期活動</span>
                                <span id="upcoming-count" class="bg-[#EF8275] text-white px-2 py-0.5 rounded-full text-[10px] ml-2">0</span>
                            </div>
                            <button id="upcoming-toggle-btn" class="hidden text-slate-400 hover:text-[#4F97E9] px-1 transition" onclick="toggleUpcoming()">
                                <i class="fa-solid fa-plus text-[12px]"></i>
                            </button>
                        </div>
                        <div id="upcoming-list" class="flex flex-col space-y-1"></div>
                    </div>
                    
                    <div id="shopping-container" class="hidden flex-col">
                        <div class="text-[14px] font-bold text-slate-500 mb-3 flex items-center justify-between">
                            <span>待買清單</span>
                            <div class="flex items-center gap-2">
                                <button id="shopping-edit-btn" class="text-slate-400 hover:text-[#4F97E9] transition" onclick="openShoppingModal()"><i class="fa-solid fa-pen text-[12px]"></i></button>
                                <button id="shopping-toggle-btn" class="hidden text-slate-400 hover:text-[#4F97E9] transition px-1" onclick="toggleShopping()"><i class="fa-solid fa-plus text-[12px]"></i></button>
                            </div>
                        </div>
                        <div id="shopping-list" class="flex flex-col border-t border-slate-100 pt-1"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col min-w-0 relative bg-[#FFFCF2] z-10 w-full overflow-hidden">
            <div id="loading-overlay" class="hidden absolute inset-0 bg-white/80 z-50 flex items-center justify-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#4F97E9]"></div>
            </div>

            <div class="flex-1 p-0 sm:p-2 md:p-6 overflow-hidden flex flex-col w-full">
                <div class="max-w-[1400px] mx-auto w-full h-full flex flex-col" id="calendar-content"></div>
            </div>
        </div>
    </div>

    <div id="day-detail-panel" class="fixed inset-y-0 right-0 w-full md:w-[380px] bg-white shadow-2xl border-l transform translate-x-full transition-transform duration-300 z-[60] flex flex-col">
        <div class="p-5 border-b flex justify-between items-center bg-white z-10 mt-safe md:mt-0">
            <div class="font-bold text-[19px] text-[#2C2C54] flex items-center gap-3" id="detail-date-title"></div>
            <button onclick="closeDayDetail()" class="text-slate-400 hover:text-slate-600 text-xl px-2 transition-colors"><i class="fa-solid fa-times"></i></button>
        </div>
        <div class="flex-1 overflow-y-auto p-5 space-y-4 bg-[#FFFCF2]" id="detail-events-list"></div>
        <div class="p-5 bg-white border-t z-10">
            <button onclick="openTripModalFromDetail()" class="w-full py-3.5 text-white rounded-[14px] font-bold text-[15px] shadow-sm hover:opacity-90 transition" style="background:#4F97E9;">在此日期新增行程</button>
        </div>
    </div>
    <div id="detail-overlay" onclick="closeDayDetail()" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[55] hidden transition-opacity duration-300 cursor-pointer"></div>

    <div id="trip-modal" onclick="if (event.target.id === 'trip-modal') closeTripModal()" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[70] flex items-end md:items-center justify-center p-0 md:p-4 transition-opacity">
        <div onclick="event.stopImmediatePropagation()" class="bg-white w-full md:w-[520px] md:rounded-3xl shadow-2xl border md:border-0 rounded-t-3xl max-h-[92vh] overflow-y-auto">
            <div class="px-5 pt-5 pb-4 flex justify-between items-center border-b md:border-0 sticky top-0 bg-white z-10">
                <h3 id="modal-title" class="text-2xl font-semibold text-[#2C2C54]">新增行程</h3>
                <button onclick="closeTripModal()" class="text-2xl text-slate-400 hover:text-slate-600 transition-colors">×</button>
            </div>
            <form id="trip-form" onsubmit="handleTripFormSubmit(event)" class="p-5 space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1.5 text-[#2C2C54]">行程標題 <span class="text-red-500" id="title-required-star">*</span></label>
                    <input type="text" id="trip-title" required class="w-full px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9] outline-none transition" placeholder="例如：產品開發會議">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1.5 text-[#2C2C54]">開始日期</label>
                        <input type="date" id="start-date" required class="w-full px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9] outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1.5 text-[#2C2C54]">開始時間 (留白為全天)</label>
                        <input type="time" id="start-time" class="w-full px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9] outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1.5 text-[#2C2C54]">結束日期</label>
                        <input type="date" id="end-date" class="w-full px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9] outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1.5 text-[#2C2C54]">結束時間</label>
                        <input type="time" id="end-time" class="w-full px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9] outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1.5 text-[#2C2C54]">地點</label>
                    <input type="text" id="location" placeholder="例如：台北信義區" class="w-full px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9] outline-none">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1.5 text-[#2C2C54]">描述 / 備註</label>
                    <textarea id="trip-desc" rows="2" class="w-full px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9] outline-none resize-none transition" placeholder="會議議程..."></textarea>
                </div>
                <div>
                    <label id="color-picker-label" class="block text-sm font-semibold mb-2 text-[#2C2C54]">顏色標記</label>
                    <div class="flex flex-wrap gap-3" id="color-picker"></div>
                </div>
                <div class="flex gap-3 pt-3 sticky bottom-0 bg-white pb-2 border-t mt-4">
                    <button type="button" id="delete-trip-btn" onclick="deleteTrip()" class="hidden w-12 flex items-center justify-center py-3 border border-red-200 text-red-500 rounded-2xl hover:bg-red-50 transition-colors"><i class="fa-solid fa-trash"></i></button>
                    <button type="button" onclick="closeTripModal()" class="flex-1 py-3 border border-[#E8E3FF] rounded-2xl text-[#2C2C54] hover:bg-slate-50 transition-colors font-medium">取消</button>
                    <button type="submit" id="save-trip-btn" class="flex-1 py-3.5 text-white rounded-2xl font-semibold shadow-sm hover:opacity-90 transition-opacity bg-[#4F97E9]">儲存</button>
                </div>
            </form>
        </div>
    </div>

    <div id="shopping-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[70] flex items-end md:items-center justify-center p-0 md:p-4 transition-opacity">
        <div class="bg-white w-full md:w-[400px] md:rounded-3xl shadow-2xl border md:border-0 rounded-t-3xl max-h-[90vh] flex flex-col">
            <div class="px-5 pt-5 pb-4 flex justify-between items-center border-b shrink-0">
                <h3 class="text-xl font-bold text-[#2C2C54]">編輯待買清單</h3>
                <button onclick="closeShoppingModal()" class="text-2xl text-slate-400 hover:text-slate-600 transition-colors">×</button>
            </div>
            <div class="p-5 flex-1 overflow-y-auto no-scrollbar">
                <div id="shopping-edit-list" class="space-y-3"></div>
                <button type="button" onclick="addShoppingItemInput()" class="mt-4 flex items-center gap-1.5 text-sm text-[#4F97E9] font-bold hover:opacity-80 transition">
                    <i class="fa-solid fa-circle-plus"></i> 新增項目
                </button>
            </div>
            <div class="p-5 border-t bg-slate-50 flex gap-3 shrink-0 rounded-b-3xl">
                <button type="button" onclick="closeShoppingModal()" class="flex-1 py-3 bg-white border border-[#E8E3FF] rounded-2xl text-[#2C2C54] hover:bg-slate-50 font-bold transition">取消</button>
                <button type="button" onclick="saveShoppingList()" class="flex-1 py-3 text-white rounded-2xl font-bold bg-[#4F97E9] hover:opacity-90 transition shadow-sm">儲存</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== Supabase Client ====================
        const SUPABASE_URL = 'https://qemfwpdkhbbqnxrcmuyi.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlbWZ3cGRraGJicW54cmNtdXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjQzNTUsImV4cCI6MjA5Nzk0MDM1NX0.e66XIq1JTjHcQRUAWkKDZKA3pFHOsRX_pLbS-yK74Gg';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let myCalendars = [];
        let currentCalendarId = null;
        let isEditingCalendars = false;

        let isUpcomingExpanded = false;
        let isShoppingExpanded = false;
        let shoppingItems = [];

        function showLoading() { document.getElementById('loading-overlay').classList.remove('hidden'); }
        function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }

        // ==================== UI / Menu Control ====================
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (window.innerWidth >= 768) {
                sb.classList.toggle('md:hidden');
            } else {
                sb.classList.toggle('-translate-x-full');
                overlay.classList.toggle('hidden');
            }
        }

        function toggleProfileMenu(e) {
            e.stopPropagation();
            document.getElementById('profile-menu').classList.toggle('hidden');
        }

        window.addEventListener('click', () => {
            const menu = document.getElementById('profile-menu');
            if (menu && !menu.classList.contains('hidden')) menu.classList.add('hidden');
        });

        // ==================== Swipe Gesture ====================
        let touchstartX = 0; let touchendX = 0; let touchstartY = 0; let touchendY = 0;
        function handleSwipe() {
            // 修正：限制只在月曆視圖啟用上下滑動，避免與週曆/年曆垂直滾動衝突
            if (currentView !== 'month') return;
            const diffX = touchstartX - touchendX; const diffY = touchstartY - touchendY;
            if (Math.abs(diffY) > Math.abs(diffX) && Math.abs(diffY) > 50) {
                if (diffY > 0) nextPeriod(); else prevPeriod();           
            }
        }
        const calContainer = document.getElementById('calendar-content');
        calContainer.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; touchstartY = e.changedTouches[0].screenY; }, {passive: true});
        calContainer.addEventListener('touchend', e => { touchendX = e.changedTouches[0].screenX; touchendY = e.changedTouches[0].screenY; handleSwipe(); }, {passive: true});

        // ==================== Auth & Sync ====================
        async function signInWithGoogle() {
            try {
                const { error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'google', 
                    options: { redirectTo: 'https://austing2021-debug.github.io/calendar/', queryParams: { prompt: 'select_account' } }
                });
                if (error) throw error;
            } catch (error) { alert('Google 登入失敗：' + error.message); }
        }

        async function syncGoogleCalendar() {
            try {
                const { error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'google', 
                    options: { 
                        redirectTo: 'https://austing2021-debug.github.io/calendar/',
                        scopes: 'https://www.googleapis.com/auth/calendar.readonly',
                        queryParams: { prompt: 'consent' }
                    }
                });
                if (error) throw error;
            } catch (error) { alert('Google 授權失敗：' + error.message); }
        }

        async function fetchGoogleEvents(token) {
            try {
                showLoading();
                const now = new Date();
                const timeMin = new Date(now.getFullYear(), now.getMonth() - 2, 1).toISOString();
                const timeMax = new Date(now.getFullYear() + 1, now.getMonth(), 1).toISOString();
                
                const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${timeMin}&timeMax=${timeMax}&singleEvents=true&orderBy=startTime`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error?.message || '未知的 API 錯誤');
                
                if (data.items) {
                    googleEvents = data.items.map(item => {
                        const startStr = item.start.dateTime || item.start.date;
                        let endStr = item.end.dateTime || item.end.date;
                        let startDateFinal = startStr.split('T')[0];
                        let endDateFinal = endStr.split('T')[0];
                        
                        if (item.end.date && item.end.date !== item.start.date) {
                            const d = new Date(item.end.date);
                            d.setDate(d.getDate() - 1);
                            endDateFinal = d.toISOString().split('T')[0];
                        }

                        return {
                            id: item.id,
                            title: '📅 ' + (item.summary || '未命名行程'),
                            startDate: startDateFinal, endDate: endDateFinal,
                            startTime: item.start.dateTime ? startStr.split('T')[1].substring(0,5) : null,
                            endTime: item.end.dateTime ? endStr.split('T')[1].substring(0,5) : null,
                            location: item.location || '', description: item.description || '',
                            color: '#34A853', isGoogle: true
                        };
                    });
                }
                
                const syncBtn = document.getElementById('sync-google-btn');
                if (syncBtn) {
                    syncBtn.innerHTML = '<i class="fa-brands fa-google text-emerald-500 mr-1"></i> 已同步 Google 日曆';
                    syncBtn.classList.replace('text-[#2C2C54]', 'text-emerald-600');
                    syncBtn.classList.add('bg-emerald-50', 'border-emerald-200');
                    syncBtn.disabled = true; 
                }
                hideLoading();
            } catch(e) {
                console.error("Fetch Google Events failed:", e);
                hideLoading();
                alert("Google 日曆同步失敗：\n" + e.message + "\n\n👉 請確認是否已在 Google Console 啟用「Google Calendar API」，並且在登入畫面有勾選「查看日曆」的權限！");
            }
        }

            const link = `${window.location.origin}${window.location.pathname}?join=${currentCalendarId}`;
            try { await navigator.clipboard.writeText(link); alert('🎉 共用連結已複製！傳送給朋友即可邀請他們加入。');

        async function loadCalendars() {
            if (!currentUser) return;
            const { data } = await supabaseClient.from('calendar_members').select('calendar_id, role, calendars(id, name)').eq('user_id', currentUser.id).order('created_at', { ascending: true });
            if (data && data.length > 0) {
                myCalendars = data.map(d => ({ ...d.calendars, role: d.role }));
                if (!currentCalendarId || !myCalendars.find(c => c.id === currentCalendarId)) currentCalendarId = myCalendars[0].id;
            } else {
                const { data: newCal } = await supabaseClient.from('calendars').insert({ name: '我的預設行事曆', created_by: currentUser.id }).select().single();
                if (newCal) {
                    await supabaseClient.from('calendar_members').insert({ calendar_id: newCal.id, user_id: currentUser.id, role: 'owner' });
                    myCalendars = [{...newCal, role: 'owner'}];
                    currentCalendarId = newCal.id;
                }
            }
            renderCalendarListUI();
            await fetchTrips();
        }

            trips = data ? data.map(t => ({

        function renderUpcoming() {
            const c = document.getElementById('upcoming-list');
            const countEl = document.getElementById('upcoming-count');
            const toggleBtn = document.getElementById('upcoming-toggle-btn');
            if (!c || !countEl || !currentUser) return;
            
            const today = new Date().toISOString().split('T')[0];
            const nextMonth = new Date(Date.now() + 30 * 86400000).toISOString().split('T')[0];
            const allTrips = [...trips, ...googleEvents];
            const future = allTrips.filter(t => t.startDate >= today && t.startDate <= nextMonth).sort((a,b) => a.startDate.localeCompare(b.startDate));
            
            countEl.textContent = future.length;
            
            if (future.length === 0) {
                toggleBtn.classList.add('hidden');
                c.innerHTML = `<div class="px-3 py-4 text-xs text-slate-400 text-center bg-slate-50 rounded-xl">未來一個月內無行程</div>`;
                return;
            }
            
            if (future.length > 3) {
                toggleBtn.classList.remove('hidden');
                toggleBtn.innerHTML = isUpcomingExpanded ? '<i class="fa-solid fa-minus text-[12px]"></i>' : '<i class="fa-solid fa-plus text-[12px]"></i>';
            } else {
                toggleBtn.classList.add('hidden');
            }
            
            const limit = isUpcomingExpanded ? future.length : 3;
            
            c.innerHTML = future.slice(0, limit).map(t => {
                const startParts = t.startDate.split('-');
                let dateDisplay = `${startParts[1]}/${startParts[2]}`;
                if (t.endDate && t.endDate !== t.startDate) {
                    const endParts = t.endDate.split('-');
                    dateDisplay += ` ~ ${endParts[1]}/${endParts[2]}`;
                }
                return `
                <div class="flex items-start gap-x-2.5 py-1.5 pl-2 cursor-pointer hover:bg-slate-50 transition rounded-lg" onclick="openTripModal(${JSON.stringify(t).replace(/"/g,'&quot;')})">

                    </div>
                </div>
                `;
            }).join('');
        }

        // ==================== Render Core ====================
        let currentDate = new Date();
        let currentView = 'month'; 
        let selectedDate = null;
        let selectedColor = '#4F97E9';
        
        const NEW_COLORS = ['#FF6060', '#F8BD5E', '#F3E775', '#8FEC6F', '#76D2EE', '#6B8EF8', '#B88BF7'];
        const WEEKDAYS = ['週日','週一','週二','週三','週四','週五','週六'];
        const EN_MONTH_NAMES = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const TAIWAN_HOLIDAYS = { "2026-01-01":"元旦","2026-02-17":"除夕","2026-02-18":"春節","2026-04-03":"兒童節","2026-04-04":"清明節","2026-06-19":"端午節","2026-09-25":"中秋節","2026-10-10":"國慶日" };

        function getHoliday(dateStr) { return TAIWAN_HOLIDAYS[dateStr] || null; }
        
        function getShortLunar(dateStr) { 
            try {
                const d = new Date(dateStr);
                const lunar = Lunar.fromDate(d);
                return `${lunar.getMonth()}.${lunar.getDay()}`; 
            } catch(e) {
                const d = new Date(dateStr); return `${d.getMonth()+1}.${d.getDate()}`;
            }
        }

        function switchView(view) {
            currentView = view;
            ['week','month','year'].forEach(v => {
                const btn = document.getElementById(`btn-${v}`);
                if(btn) btn.classList.toggle('active', view===v);
            });
            renderCurrentView();
        }

        function renderCurrentView() {
            const c = document.getElementById('calendar-content');
            c.innerHTML = '';
            if (currentView === 'month') renderMonthView(c);
            else if (currentView === 'week') renderWeekView(c);
            else renderYearView(c);
        }

        function getTripsForDate(dateStr) { 
            const allTrips = [...trips, ...googleEvents];
            return allTrips.filter(t => t.startDate <= dateStr && (!t.endDate || t.endDate >= dateStr))
                           .sort((a,b) => (a.startTime||'').localeCompare(b.startTime||'')); 
        }

        function createMonthTripPill(trip, dateStr) {
            const p = document.createElement('div');
            const d = new Date(dateStr);
            const isStart = dateStr === trip.startDate || d.getDay() === 0;
            const tripEnd = trip.endDate || trip.startDate;
            const isEnd = dateStr === tripEnd || d.getDay() === 6;
            
            p.className = `event-pill truncate transition hover:opacity-80`;
            p.style.backgroundColor = trip.color || '#4F97E9';
            p.style.color = '#fff';
            
            p.style.marginLeft = isStart ? '2px' : '0px';
            p.style.marginRight = isEnd ? '2px' : '0px';
            p.style.borderTopLeftRadius = isStart ? '4px' : '0px';
            p.style.borderBottomLeftRadius = isStart ? '4px' : '0px';
            p.style.borderTopRightRadius = isEnd ? '4px' : '0px';
            p.style.borderBottomRightRadius = isEnd ? '4px' : '0px';
            p.style.paddingLeft = isStart ? '4px' : '2px';
            
            p.innerHTML = `<span class="font-bold truncate w-full block leading-[16px]">${isStart ? trip.title : '&nbsp;'}</span>`;
            p.onclick = e => { e.stopPropagation(); openTripModal(trip); };
            return p;
        }

        // ==================== 月曆視圖 ====================
        function renderMonthView(container) {
            const year = currentDate.getFullYear(), month = currentDate.getMonth();
            document.getElementById('period-title').innerHTML = `${year}年 ${month + 1}月`;

            const wrapper = document.createElement('div');
            wrapper.className = 'flex-1 flex flex-col h-full min-h-0 md:border-l md:border-t md:border-[#E8E3FF] bg-white md:rounded-lg md:shadow-sm overflow-hidden w-full';
            wrapper.innerHTML = `
                <div class="grid grid-cols-7 flex-shrink-0 bg-white w-full">
                    ${WEEKDAYS.map(d => `<div class="text-center text-[10px] md:text-[13px] py-1.5 md:py-2 text-slate-500 font-bold border-r border-b border-[#E8E3FF]">${d}</div>`).join('')}
                </div>
                <div id="month-grid" class="flex-1 grid grid-cols-7 grid-rows-6 min-h-0 w-full"></div>
            `;
            container.appendChild(wrapper);
            const grid = wrapper.querySelector('#month-grid');

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrev = new Date(year, month, 0).getDate();
            const todayStr = new Date().toISOString().split('T')[0];

            for (let i = 0; i < 42; i++) {
                let dayNum, cellDateStr, isCurrent = true, cellY = year, cellM = month;
                if (i < firstDay) {
                    dayNum = daysInPrev - firstDay + i + 1; cellM = month - 1 < 0 ? 11 : month - 1; cellY = month - 1 < 0 ? year - 1 : year; isCurrent = false;
                } else if (i >= firstDay + daysInMonth) {
                    dayNum = i - (firstDay + daysInMonth) + 1; cellM = month + 1 > 11 ? 0 : month + 1; cellY = month + 1 > 11 ? year + 1 : year; isCurrent = false;
                } else {
                    dayNum = i - firstDay + 1;
                    cellDateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
                }
                if (!cellDateStr) cellDateStr = `${cellY}-${String(cellM+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;

                const cell = document.createElement('div');
                cell.className = `calendar-cell flex flex-col pt-1 pb-0.5 overflow-hidden group min-h-[60px] md:min-h-[70px] w-full`;
                
                const isWeekend = (i % 7 === 0 || i % 7 === 6);
                
                if (!isCurrent) cell.classList.add('bg-other-month');
                else if (isWeekend) cell.classList.add('bg-current-weekend');
                else cell.classList.add('bg-current-weekday');

                if (cellDateStr === todayStr) cell.classList.add('is-today');

                const holiday = getHoliday(cellDateStr), lunarTxt = getShortLunar(cellDateStr);
                let badgeHtml = holiday ? `<span class="holiday-badge">${holiday}</span>` : `<span class="lunar-badge">${lunarTxt}</span>`;
                
                cell.innerHTML = `
                    <div class="flex flex-col md:flex-row md:items-start justify-between mb-0.5 md:mb-1 px-0.5 md:px-1 flex-shrink-0 gap-y-[2px]">
                        <span class="date-text font-bold text-[13px] md:text-[16px] text-[#2C2C54] transition-colors leading-none">${dayNum}</span>
                        <div>${badgeHtml}</div>
                    </div>
                    <div class="trips-wrap flex-1 flex flex-col gap-y-[1px] overflow-hidden mt-0.5"></div>
                `;
                
                const dayTrips = getTripsForDate(cellDateStr);
                const wrap = cell.querySelector('.trips-wrap');
                dayTrips.slice(0, 4).forEach(trip => wrap.appendChild(createMonthTripPill(trip, cellDateStr)));
                if (dayTrips.length > 4) wrap.innerHTML += `<div class="text-[9px] md:text-[10px] text-slate-500 px-1 font-bold mt-auto truncate">+${dayTrips.length-4} 更多</div>`;

                cell.onclick = (e) => { 
                    if (!e.target.closest('.event-pill')) showDayDetail(cellDateStr); 
                };
                grid.appendChild(cell);
            }
        }

        // ==================== 週曆視圖 ====================
        function renderWeekView(container) {
            const year = currentDate.getFullYear(), month = currentDate.getMonth(), day = currentDate.getDate();
            const sunday = new Date(year, month, day); sunday.setDate(sunday.getDate() - sunday.getDay());
            
            const dates = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(sunday); d.setDate(d.getDate() + i);
                dates.push(d.toISOString().split('T')[0]);
            }
            
            const startParts = dates[0].slice(5).split('-');
            const endParts = dates[6].slice(5).split('-');
            const startDateStr = `${parseInt(startParts[0])}/${parseInt(startParts[1])}`;
            const endDateStr = `${parseInt(endParts[0])}/${parseInt(endParts[1])}`;
            document.getElementById('period-title').innerHTML = `${startDateStr} ~ ${endDateStr}`;
            
            let headerHTML = '', allDayHTML = '';
            
            dates.forEach((dateStr, idx) => {
                const dObj = new Date(dateStr), dayNum = dObj.getDate();
                const lunarTxt = getShortLunar(dateStr);
                const dayColor = idx === 0 ? 'text-red-500' : (idx === 6 ? 'text-blue-500' : 'text-[#2C2C54]');
                
                headerHTML += `
                    <div class="flex flex-col items-center justify-center py-2 border-r border-[#E8E3FF]">
                        <span class="text-[9px] md:text-xs text-slate-500 font-bold">${WEEKDAYS[idx]}</span>
                        <span class="text-base md:text-xl font-black ${dayColor} mt-1">${dayNum}</span>
                        <span class="text-[8px] md:text-[10px] font-bold text-slate-400 mt-1">${lunarTxt}</span>
                    </div>
                `;

                const allTrips = getTripsForDate(dateStr);
                const allDayTrips = allTrips.filter(t => !t.startTime);
                
                let pills = allDayTrips.map(t => `<div onclick="openTripModal(${JSON.stringify(t).replace(/"/g,'&quot;')})" class="text-[9px] md:text-[11px] px-1 py-0.5 rounded text-white font-bold cursor-pointer truncate mb-1" style="background:${t.color||'#EF8275'}">${t.title}</div>`).join('');
                if(getHoliday(dateStr)) pills = `<div class="text-[9px] md:text-[11px] px-1 py-0.5 rounded text-white font-bold bg-[#F0958B] mb-1 truncate">${getHoliday(dateStr)}</div>` + pills;

                allDayHTML += `<div class="border-r border-[#E8E3FF] p-1 overflow-hidden cursor-pointer" onclick="showDayDetail('${dateStr}')">${pills}</div>`;
            });

            const timeLabels = [];
            for(let i=0; i<24; i++) {
                let label = '';
                if(i===0) label = '凌晨12'; else if(i<12) label = `上午${i}`; else if(i===12) label = '中午12'; else label = `下午${i-12}`;
                timeLabels.push(`<div class="time-slot flex justify-end pr-1 md:pr-2 pt-1 text-[8px] md:text-[10px] font-bold text-slate-400 border-r border-[#E8E3FF]">${label}</div>`);
            }

            const wrapper = document.createElement('div');
            wrapper.className = 'flex-1 flex flex-col bg-[#fafafa] md:rounded-lg border-y md:border border-[#E8E3FF] overflow-hidden min-h-0 shadow-sm w-full';
            wrapper.innerHTML = `
                <div class="grid grid-cols-[35px_repeat(7,1fr)] md:grid-cols-[60px_repeat(7,1fr)] border-b border-[#E8E3FF] flex-shrink-0 bg-white z-10 w-full">
                    <div class="border-r border-[#E8E3FF]"></div>
                    ${headerHTML}
                </div>
                <div class="grid grid-cols-[35px_repeat(7,1fr)] md:grid-cols-[60px_repeat(7,1fr)] border-b border-[#E8E3FF] flex-shrink-0 bg-white z-10 min-h-[35px] w-full">
                    <div class="border-r border-[#E8E3FF] text-[8px] md:text-xs font-bold text-slate-400 flex items-center justify-center bg-slate-50">全天</div>
                    ${allDayHTML}
                </div>
                <div class="flex-1 overflow-y-auto relative bg-white w-full">
                    <div class="grid grid-cols-[35px_repeat(7,1fr)] md:grid-cols-[60px_repeat(7,1fr)] relative min-h-[1440px] w-full">
                        <div class="bg-slate-50 relative z-10">${timeLabels.join('')}</div>
                        ${dates.map(dateStr => `
                            <div class="border-r border-[#E8E3FF] time-grid-bg relative cursor-pointer group" onclick="showDayDetail('${dateStr}')">
                                ${generateTimeTripsHTML(dateStr)}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            container.appendChild(wrapper);
            wrapper.querySelector('.overflow-y-auto').scrollTop = 8 * 60;
        }

        function generateTimeTripsHTML(dateStr) {
            const timedTrips = getTripsForDate(dateStr).filter(t => t.startTime);
            return timedTrips.map(t => {
                const [h, m] = t.startTime.split(':').map(Number);
                const top = h * 60 + m;
                return `
                    <div onclick="event.stopPropagation(); openTripModal(${JSON.stringify(t).replace(/"/g,'&quot;')})" 
                         class="absolute left-0.5 right-0.5 md:left-1 md:right-1 rounded p-0.5 md:p-1.5 text-white text-[8px] md:text-[11px] font-bold leading-tight cursor-pointer shadow-sm hover:opacity-90 overflow-hidden" 
                         style="top: ${top}px; height: 50px; background: ${t.color||'#4F97E9'};">
                        ${t.title}<br><span class="opacity-80">${t.startTime}</span>
                    </div>
                `;
            }).join('');
        }

        // ==================== 年曆視圖 ====================
        function renderYearView(container) {
            const year = currentDate.getFullYear(); document.getElementById('period-title').innerHTML = `${year} 年`;
            const wrapper = document.createElement('div');
            wrapper.className = 'flex-1 grid grid-cols-3 md:grid-cols-4 grid-rows-4 md:grid-rows-3 gap-2 md:gap-4 h-full min-h-0 pb-4 overflow-y-auto px-1 md:px-0';
            for (let m = 0; m < 12; m++) {
                const mini = document.createElement('div');
                mini.className = 'bg-white border border-[#E8E3FF] rounded-2xl cursor-pointer shadow-sm hover:shadow-md hover:border-[#4F97E9] flex flex-col items-center justify-center transition-all hover:-translate-y-1 h-full min-h-[90px]';
                mini.innerHTML = `<div class="font-black text-[#2C2C54] text-lg md:text-3xl mb-0.5 md:mb-1">${m+1} <span class="text-xs md:text-lg">月</span></div><div class="text-[9px] md:text-sm text-slate-400 font-bold uppercase tracking-wider">${EN_MONTH_NAMES[m]}</div>`;
                mini.onclick = () => { currentDate = new Date(year, m, 1); switchView('month'); };
                wrapper.appendChild(mini);
            }
            container.appendChild(wrapper);
        }

        // ==================== 右側面板 ====================
        function showDayDetail(dateStr) {
            selectedDate = dateStr;
            const d = new Date(dateStr), holiday = getHoliday(dateStr), lunarTxt = getShortLunar(dateStr);
            let badgeHtml = holiday ? `<span class="bg-[#F0958B] text-white text-[11px] px-2 py-0.5 rounded-lg font-semibold tracking-wide">${holiday}</span>` : `<span class="bg-[#ffffff] text-black border border-slate-300 text-[11px] px-2 py-0.5 rounded-lg font-semibold tracking-wide">${lunarTxt}</span>`;
            
            document.getElementById('detail-date-title').innerHTML = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 (${WEEKDAYS[d.getDay()]}) ${badgeHtml}`;
            
            const list = document.getElementById('detail-events-list');
            const dayTrips = getTripsForDate(dateStr);
            if (dayTrips.length === 0) {
                list.innerHTML = '<div class="text-center text-slate-400 mt-10 font-bold">目前無行程</div>';
            } else {
                list.innerHTML = dayTrips.map(t => `
                    <div class="bg-white border border-[#E8E3FF] rounded-2xl p-4 shadow-sm relative cursor-pointer hover:border-[#4F97E9] transition" onclick="openTripModal(${JSON.stringify(t).replace(/"/g,'&quot;')})">
                        <div class="w-2 h-full absolute left-0 top-0 rounded-l-2xl" style="background:${t.color||'#4F97E9'}"></div>
                        <div class="font-bold text-[#2C2C54] text-[16px] pl-3">${t.title}</div>
                        ${t.startTime ? `<div class="text-[13px] text-slate-500 font-medium pl-3 mt-1.5 flex items-center gap-1.5"><i class="fa-regular fa-clock"></i>${t.startTime}${t.endTime ? ' - '+t.endTime : ''}</div>` : ''}
                    </div>
                `).join('');
            }
            
            document.getElementById('day-detail-panel').classList.remove('translate-x-full');
            document.getElementById('detail-overlay').classList.remove('hidden');
        }

        function closeDayDetail() {
            document.getElementById('day-detail-panel').classList.add('translate-x-full');
            document.getElementById('detail-overlay').classList.add('hidden');
        }

        function openTripModalFromDetail() { openTripModal(null, selectedDate); }

        function openTripModal(trip = null, prefillDate = null) {
            document.getElementById('trip-modal').classList.remove('hidden');
            document.getElementById('trip-modal').classList.add('flex');
            document.getElementById('trip-form').reset();
            initColorPicker();
            
            const saveBtn = document.getElementById('save-trip-btn');
            const deleteBtn = document.getElementById('delete-trip-btn');
            const modalTitle = document.getElementById('modal-title');
            const formInputs = document.querySelectorAll('#trip-form input, #trip-form textarea');
            
            formInputs.forEach(input => input.disabled = false);
            saveBtn.classList.remove('hidden');
            document.getElementById('color-picker-label').classList.remove('hidden');
            document.getElementById('color-picker').classList.remove('hidden');

            if (trip) {
                editingTripId = trip.id; 
                
                if (trip.isGoogle) {
                    modalTitle.textContent = '檢視 Google 行程 (唯讀)';
                    saveBtn.classList.add('hidden');
                    deleteBtn.classList.add('hidden');
                    formInputs.forEach(input => input.disabled = true);
                    document.getElementById('color-picker-label').classList.add('hidden');
                    document.getElementById('color-picker').classList.add('hidden');
                } else {
                    modalTitle.textContent = '編輯行程'; 
                    saveBtn.textContent = '更新';
                    deleteBtn.classList.remove('hidden');
                }
                
                document.getElementById('trip-title').value = trip.title || '';
                document.getElementById('start-date').value = trip.startDate || '';
                document.getElementById('end-date').value = trip.endDate || '';
                document.getElementById('start-time').value = trip.startTime || '';
                document.getElementById('end-time').value = trip.endTime || '';
                document.getElementById('location').value = trip.location || '';
                document.getElementById('trip-desc').value = trip.description || '';
                if (trip.color && !trip.isGoogle) { selectedColor = trip.color; initColorPicker(); }
            } else {
                editingTripId = null; 
                modalTitle.textContent = '新增行程'; 
                saveBtn.textContent = '儲存';
                deleteBtn.classList.add('hidden');
                const d = prefillDate || new Date().toISOString().split('T')[0];
                document.getElementById('start-date').value = d; 
                document.getElementById('end-date').value = d;
            }
        }

        function closeTripModal() {
            document.getElementById('trip-modal').classList.remove('flex'); document.getElementById('trip-modal').classList.add('hidden');
        }

        function initColorPicker() {
            const c = document.getElementById('color-picker'); c.innerHTML = '';
            NEW_COLORS.forEach(col => {
                const s = document.createElement('div');
                s.className = `w-8 h-8 rounded-full cursor-pointer transition ${col === selectedColor ? 'ring-2 ring-offset-2 ring-[#2C2C54] scale-110' : 'hover:scale-110'}`;
                s.style.backgroundColor = col; s.onclick = () => { selectedColor = col; initColorPicker(); }; c.appendChild(s);
            });
        }

        // ==================== Navigation ====================
        function prevPeriod() {
            if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() - 1);
            else if (currentView === 'week') currentDate.setDate(currentDate.getDate() - 7);
            else currentDate.setFullYear(currentDate.getFullYear() - 1);
            renderCurrentView();
        }
        function nextPeriod() {
            if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() + 1);
            else if (currentView === 'week') currentDate.setDate(currentDate.getDate() + 7);
            else currentDate.setFullYear(currentDate.getFullYear() + 1);
            renderCurrentView();
        }
        function goToday() { currentDate = new Date(); renderCurrentView(); }

        window.onload = () => { 
            switchView('month');
            checkUserAndInitialize(); 
        };
    </script>
</body>
</html>
