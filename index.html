<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的行事曆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; background: #FFFCF2; }
        .calendar-cell { transition: all 0.1s ease; min-height: 78px; padding: 6px; border: 1px solid #E8E3FF; font-size: 13px; }
        .calendar-cell:hover { transform: translateY(-1px); border-color: #EF8275 !important; border-width: 2px; }
        .event-pill { font-size: 10px; padding: 1px 5px; border-radius: 5px; margin-bottom: 1px; }
        .view-btn { background-color: #4F97E9; color: #FFFCF2; font-size: 13px; }
        .view-btn.active { background-color: #2C2C54 !important; color: #E8E3FF !important; font-weight: 600; }
        .holiday-badge, .lunar-badge { 
            font-size: 9px; padding: 1px 5px; border-radius: 4px; 
            background: #EF8275; color: #FFFCF2; font-weight: 600; display: inline-block;
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="md:hidden bg-white border-b px-4 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-x-3">
            <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:#2C2C54;">
                <i class="fa-solid fa-calendar text-white"></i>
            </div>
            <h1 class="text-xl font-bold" style="color:#2C2C54;">行事曆</h1>
        </div>
        <button onclick="toggleMobileSidebar()" class="w-10 h-10 flex items-center justify-center text-[#2C2C54]">
            <i class="fa-solid fa-bars text-xl"></i>
        </button>
    </div>

    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div id="sidebar" class="sidebar w-72 bg-white border-r border-slate-200 flex flex-col flex-shrink-0 md:relative md:translate-x-0 fixed md:static h-full z-50 transform -translate-x-full md:transform-none transition-transform">
            <div class="px-6 pt-6 pb-4 border-b hidden md:block">
                <div class="flex items-center gap-x-3">
                    <div class="w-10 h-10 rounded-2xl flex items-center justify-center" style="background:#2C2C54;">
                        <i class="fa-solid fa-calendar text-white text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold tracking-tighter" style="color:#2C2C54;">我的行事曆</h1>
                    </div>
                </div>
            </div>

            <!-- User Info -->
            <div id="user-info" class="px-5 py-4 border-b hidden">
                <div class="flex items-center gap-x-3">
                    <img id="user-avatar" class="w-10 h-10 rounded-full object-cover" alt="">
                    <div class="flex-1 min-w-0">
                        <div id="user-name" class="font-semibold text-sm truncate"></div>
                        <div id="user-email" class="text-xs text-slate-500 truncate"></div>
                    </div>
                    <button onclick="signOut()" class="text-red-500 hover:text-red-600 p-1">
                        <i class="fa-solid fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>

            <div class="px-5 pt-5 space-y-2">
                <button onclick="openTripModal()" class="w-full flex items-center justify-center gap-x-2 px-4 py-3 text-white rounded-2xl text-sm font-semibold shadow-sm" style="background:#4F97E9;">
                    <i class="fa-solid fa-plus"></i>
                    <span>新增行程</span>
                </button>

                <button onclick="showGoogleSyncModal()" class="w-full flex items-center justify-center gap-x-2 px-4 py-2.5 bg-white border rounded-2xl text-sm font-medium" style="color:#2C2C54; border-color:#E8E3FF;">
                    <i class="fa-brands fa-google"></i>
                    <span>同步 Google 行程曆</span>
                </button>

                <button id="google-login-btn" onclick="signInWithGoogle()" class="w-full flex items-center justify-center gap-x-2 px-4 py-2.5 bg-white border border-[#E8E3FF] rounded-2xl text-sm font-medium text-[#2C2C54]">
                    <i class="fa-brands fa-google text-red-500"></i>
                    <span>使用 Google 登入</span>
                </button>
            </div>

            <div class="px-5 pt-6 flex-1">
                <div class="flex items-center justify-between mb-3 px-1">
                    <div class="text-xs font-semibold flex items-center gap-x-2" style="color:#4F97E9;">
                        <i class="fa-solid fa-clock"></i>
                        <span>即將到來</span>
                    </div>
                    <span id="upcoming-count" class="text-[10px] px-2 py-px rounded-full text-white" style="background:#4F97E9;"></span>
                </div>
                <div id="upcoming-list" class="space-y-1 text-sm"></div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col min-w-0">
            <div class="h-16 border-b bg-white px-4 md:px-8 flex items-center justify-between flex-shrink-0">
                <div class="flex items-center gap-x-3">
                    <div class="flex items-center bg-white border border-[#E8E3FF] rounded-3xl p-1">
                        <button onclick="prevPeriod()" class="w-9 h-9 flex items-center justify-center rounded-[14px]" style="color:#4F97E9;">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>
                        <div id="period-title" class="px-5 font-semibold text-lg md:text-xl min-w-[150px] text-center cursor-pointer" style="color:#2C2C54;" onclick="goToday()"></div>
                        <button onclick="nextPeriod()" class="w-9 h-9 flex items-center justify-center rounded-[14px]" style="color:#4F97E9;">
                            <i class="fa-solid fa-chevron-right"></i>
                        </button>
                    </div>
                    <button onclick="goToday()" class="hidden md:flex px-4 py-1.5 text-sm border border-[#E8E3FF] rounded-2xl items-center gap-x-2 text-[#2C2C54]">
                        <span>今天</span>
                    </button>
                </div>

                <div class="flex items-center gap-x-2">
                    <div class="rounded-3xl p-1 flex text-sm">
                        <button onclick="switchView('week')" id="btn-week" class="view-btn px-4 py-1.5 rounded-[14px] text-sm">週</button>
                        <button onclick="switchView('month')" id="btn-month" class="view-btn active px-4 py-1.5 rounded-[14px] text-sm">月</button>
                        <button onclick="switchView('year')" id="btn-year" class="view-btn px-4 py-1.5 rounded-[14px] text-sm">年</button>
                    </div>
                    <button onclick="showAllTripsModal()" class="px-3 md:px-4 py-2 text-sm flex items-center gap-x-2 border border-[#E8E3FF] rounded-2xl text-[#2C2C54]">
                        <span class="hidden md:inline">所有行程</span>
                        <i class="fa-solid fa-list-ul md:hidden"></i>
                    </button>
                </div>
            </div>

            <div class="flex-1 p-4 md:p-6 overflow-auto" style="background:#FFFCF2;">
                <div class="max-w-[1200px] mx-auto" id="calendar-content"></div>
            </div>
        </div>
    </div>

    <!-- Trip Modal -->
    <div id="trip-modal" onclick="if (event.target.id === 'trip-modal') closeTripModal()" class="hidden fixed inset-0 bg-black/60 z-50 flex items-end md:items-center justify-center p-0 md:p-4">
        <div onclick="event.stopImmediatePropagation()" class="bg-white w-full md:w-[520px] md:rounded-3xl shadow-2xl border md:border-0 rounded-t-3xl max-h-[92vh] overflow-y-auto">
            <div class="px-5 pt-5 pb-4 flex justify-between items-center border-b md:border-0 sticky top-0 bg-white z-10">
                <h3 id="modal-title" class="text-2xl font-semibold" style="color:#2C2C54;">新增行程</h3>
                <button onclick="closeTripModal()" class="text-2xl text-slate-400">×</button>
            </div>

            <form id="trip-form" onsubmit="handleTripFormSubmit(event)" class="p-5 space-y-4">
                <div>
                    <label class="block text-sm font-semibold mb-1.5" style="color:#2C2C54;">行程標題 <span class="text-red-500">*</span></label>
                    <input type="text" id="trip-title" required class="w-full px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9]" placeholder="例如：產品開發會議">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1.5" style="color:#2C2C54;">開始日期</label>
                        <input type="date" id="start-date" required class="w-full px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9]">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1.5" style="color:#2C2C54;">開始時間</label>
                        <div class="flex gap-2">
                            <input type="time" id="start-time" class="flex-1 px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9]">
                            <select id="start-ampm" class="w-20 px-3 border border-[#E8E3FF] rounded-2xl"><option>AM</option><option>PM</option></select>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-1.5" style="color:#2C2C54;">結束日期</label>
                        <input type="date" id="end-date" class="w-full px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9]">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1.5" style="color:#2C2C54;">結束時間</label>
                        <div class="flex gap-2">
                            <input type="time" id="end-time" class="flex-1 px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9]">
                            <select id="end-ampm" class="w-20 px-3 border border-[#E8E3FF] rounded-2xl"><option>AM</option><option>PM</option></select>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1.5" style="color:#2C2C54;">提醒時間</label>
                    <input type="datetime-local" id="reminder" class="w-full px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9]">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold mb-1.5" style="color:#2C2C54;">地點</label>
                    <div class="flex gap-2">
                        <input type="text" id="location" placeholder="例如：台北信義區" class="flex-1 px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9]">
                        <button type="button" onclick="openGoogleMaps()" class="px-4 py-3 border border-[#E8E3FF] rounded-2xl text-[#EF8275]">地圖</button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1.5" style="color:#2C2C54;">相關連結</label>
                    <input type="url" id="trip-url" placeholder="https://..." class="w-full px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9]">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1.5" style="color:#2C2C54;">描述 / 備註</label>
                    <textarea id="trip-desc" rows="2" class="w-full px-4 py-3 border border-[#E8E3FF] rounded-2xl focus:border-[#4F97E9]" placeholder="會議議程..."></textarea>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-2" style="color:#2C2C54;">顏色標記</label>
                    <div class="flex flex-wrap gap-3" id="color-picker"></div>
                </div>

                <div class="flex gap-3 pt-3 sticky bottom-0 bg-white pb-2">
                    <button type="button" onclick="closeTripModal()" class="flex-1 py-3 border border-[#E8E3FF] rounded-2xl text-[#2C2C54]">取消</button>
                    <button type="submit" id="save-trip-btn" class="flex-1 py-3.5 text-white rounded-2xl font-semibold" style="background:#4F97E9;">儲存行程</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ==================== Supabase Client ====================
        const SUPABASE_URL = 'https://qemfwpdkhbbqnxrcmuyi.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFlbWZ3cGRraGJicW54cmNtdXlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjQzNTUsImV4cCI6MjA5Nzk0MDM1NX0.e66XIq1JTjHcQRUAWkKDZKA3pFHOsRX_pLbS-yK74Gg';
        
        // 使用 supabaseClient 避免與全域 supabase 衝突
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;

        async function signInWithGoogle() {
            try {
                const { error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + window.location.pathname
                    }
                });
                if (error) throw error;
            } catch (error) {
                alert('Google 登入失敗：' + error.message);
                console.error(error);
            }
        }

        async function signOut() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const loginBtn = document.getElementById('google-login-btn');
            const userInfo = document.getElementById('user-info');

            if (user) {
                currentUser = user;
                if (loginBtn) loginBtn.classList.add('hidden');
                if (userInfo) userInfo.classList.remove('hidden');
                
                document.getElementById('user-name').textContent = user.user_metadata?.full_name || user.email;
                document.getElementById('user-email').textContent = user.email;
                if (user.user_metadata?.avatar_url) {
                    document.getElementById('user-avatar').src = user.user_metadata.avatar_url;
                }
            } else {
                if (loginBtn) loginBtn.classList.remove('hidden');
                if (userInfo) userInfo.classList.add('hidden');
            }
        }

        // ==================== Calendar Logic ====================
        let trips = [];
        let currentDate = new Date();
        let selectedDate = null;
        let currentView = 'month';
        let editingTripId = null;
        let selectedColor = '#4F97E9';
        let currentRecurrence = null;
        let draggedTripId = null;

        const NEW_COLORS = ['#FF6060', '#F8BD5E', '#F3E775', '#8FEC6F', '#76D2EE', '#6B8EF8', '#B88BF7'];
        const WEEKDAYS = ['日','一','二','三','四','五','六'];
        const MONTH_NAMES = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

        const TAIWAN_HOLIDAYS_2026 = {
            "2026-01-01":"元旦","2026-02-17":"農曆除夕","2026-02-18":"農曆新年",
            "2026-04-03":"兒童節","2026-04-04":"清明節","2026-05-01":"勞動節",
            "2026-06-19":"端午節","2026-10-01":"中秋節","2026-10-10":"國慶日"
        };

        function getShortLunar(dateStr) {
            const d = new Date(dateStr);
            const m = d.getMonth() + 1;
            const day = d.getDate();
            if (m === 6 && day === 24) return "5/29";
            if (m === 6 && day === 25) return "5/30";
            return `${m}/${day}`;
        }

        function getHoliday(dateStr) { return TAIWAN_HOLIDAYS_2026[dateStr] || null; }

        function saveToLocalStorage() { localStorage.setItem('myCalendarTrips', JSON.stringify(trips)); }
        function loadFromLocalStorage() {
            const saved = localStorage.getItem('myCalendarTrips');
            if (saved) trips = JSON.parse(saved);
            if (trips.length === 0) {
                const today = new Date().toISOString().split('T')[0];
                trips = [
                    {id:'t1', title:'產品開發會議', startDate:today, endDate:today, startTime:'14:30', endTime:null, reminder:null, location:'線上', url:'', description:'', color:'#4F97E9', recurrence:null},
                    {id:'t2', title:'客戶提案簡報', startDate: new Date(Date.now()+86400000).toISOString().split('T')[0], endDate: new Date(Date.now()+86400000).toISOString().split('T')[0], startTime:'09:00', endTime:'10:30', reminder:null, location:'台北信義區', url:'', description:'', color:'#EF8275', recurrence:'weekly'}
                ];
                saveToLocalStorage();
            }
        }

        function toggleMobileSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function switchView(view) {
            currentView = view;
            document.getElementById('btn-week').classList.toggle('active', view==='week');
            document.getElementById('btn-month').classList.toggle('active', view==='month');
            document.getElementById('btn-year').classList.toggle('active', view==='year');
            renderCurrentView();
        }

        function renderCurrentView() {
            const container = document.getElementById('calendar-content');
            container.innerHTML = '';
            if (currentView === 'month') renderMonthView(container);
            else if (currentView === 'week') renderWeekView(container);
            else renderYearView(container);
            renderUpcoming();
        }

        function renderMonthView(container) {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            document.getElementById('period-title').innerHTML = `${year} 年 ${MONTH_NAMES[month]}`;

            const wrapper = document.createElement('div');
            wrapper.innerHTML = `
                <div class="grid grid-cols-7 gap-2 mb-2 px-1">
                    ${WEEKDAYS.map(d => `<div class="text-center text-xs py-1" style="color:#6b7280;">${d}</div>`).join('')}
                </div>
                <div id="month-grid" class="grid grid-cols-7 gap-2"></div>
            `;
            container.appendChild(wrapper);
            renderMonthGrid(wrapper.querySelector('#month-grid'), year, month);
        }

        function renderMonthGrid(grid, year, month) {
            grid.innerHTML = '';
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrev = new Date(year, month, 0).getDate();

            for (let i = 0; i < 42; i++) {
                let dayNum, cellDateStr, isCurrent = true, cellY = year, cellM = month;
                if (i < firstDay) {
                    dayNum = daysInPrev - firstDay + i + 1;
                    cellM = month - 1 < 0 ? 11 : month - 1;
                    cellY = month - 1 < 0 ? year - 1 : year;
                    isCurrent = false;
                } else if (i >= firstDay + daysInMonth) {
                    dayNum = i - (firstDay + daysInMonth) + 1;
                    cellM = month + 1 > 11 ? 0 : month + 1;
                    cellY = month + 1 > 11 ? year + 1 : year;
                    isCurrent = false;
                } else {
                    dayNum = i - firstDay + 1;
                    cellDateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
                }
                if (!cellDateStr) cellDateStr = `${cellY}-${String(cellM+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;

                const cell = document.createElement('div');
                cell.className = `calendar-cell bg-white rounded-3xl flex flex-col cursor-pointer ${!isCurrent ? 'bg-[#f8fafc] text-slate-400' : ''}`;
                const todayStr = new Date().toISOString().split('T')[0];
                if (cellDateStr === todayStr) cell.style.boxShadow = '0 0 0 3px #E8E3FF';

                const header = document.createElement('div');
                header.className = 'flex items-start justify-between mb-0.5 px-1';
                const holiday = getHoliday(cellDateStr);
                const label = holiday ? `<span class="holiday-badge">${holiday}</span>` : `<span class="lunar-badge">${getShortLunar(cellDateStr)}</span>`;
                header.innerHTML = `<span class="font-semibold text-[19px] tracking-tighter">${dayNum}</span>${label}`;
                cell.appendChild(header);

                const dayTrips = getTripsForDate(cellDateStr);
                const tripsWrap = document.createElement('div');
                tripsWrap.className = 'flex-1 flex flex-col gap-y-[1px] text-[10px]';
                dayTrips.slice(0,3).forEach(trip => tripsWrap.appendChild(createTripPill(trip)));
                if (dayTrips.length > 3) {
                    const more = document.createElement('div');
                    more.className = 'text-[9px] text-slate-400 pl-1';
                    more.textContent = `+${dayTrips.length-3} 更多`;
                    tripsWrap.appendChild(more);
                }
                cell.appendChild(tripsWrap);

                cell.onclick = (e) => {
                    if (e.target.closest('.event-pill')) return;
                    selectedDate = cellDateStr;
                    if (!isCurrent) {
                        currentDate = new Date(cellY, cellM, 1);
                        renderCurrentView();
                    }
                    showFloatingPanel(cellDateStr);
                };
                grid.appendChild(cell);
            }
        }

        function createTripPill(trip) {
            const pill = document.createElement('div');
            const color = trip.color || '#4F97E9';
            pill.className = `event-pill px-1.5 py-[0.5px] text-xs`;
            pill.style.backgroundColor = color + '25';
            pill.style.borderLeft = `2.5px solid ${color}`;
            pill.draggable = true;
            pill.innerHTML = `<span class="font-medium truncate">${trip.title}</span>`;
            pill.onclick = e => { e.stopPropagation(); openTripModal(trip); };
            pill.ondragstart = e => { draggedTripId = trip.id; e.dataTransfer.setData('text/plain', trip.id); };
            return pill;
        }

        function getTripsForDate(dateStr) {
            return trips.filter(t => t.startDate <= dateStr && (!t.endDate || t.endDate >= dateStr))
                        .sort((a,b) => (a.startTime||'').localeCompare(b.startTime||''));
        }

        function renderWeekView(container) {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const day = currentDate.getDate();
            const sunday = new Date(year, month, day);
            sunday.setDate(sunday.getDate() - sunday.getDay());
            
            const dates = [];
            for (let i = 0; i < 7; i++) {
                const d = new Date(sunday); d.setDate(d.getDate() + i);
                dates.push(d.toISOString().split('T')[0]);
            }
            
            document.getElementById('period-title').innerHTML = `${dates[0].slice(5).replace('-','/')} ~ ${dates[6].slice(5).replace('-','/')}`;
            
            const wrapper = document.createElement('div');
            wrapper.innerHTML = `<div class="grid grid-cols-7 gap-2" id="week-grid"></div>`;
            container.appendChild(wrapper);
            const grid = wrapper.querySelector('#week-grid');
            
            dates.forEach(dateStr => {
                const cell = document.createElement('div');
                cell.className = `min-h-[320px] bg-white border border-[#E8E3FF] rounded-3xl p-2 cursor-pointer`;
                if (dateStr === new Date().toISOString().split('T')[0]) cell.style.boxShadow = '0 0 0 3px #E8E3FF';
                
                const dayTrips = getTripsForDate(dateStr);
                const holiday = getHoliday(dateStr);
                const lunar = getShortLunar(dateStr);
                const label = holiday ? `<span class="holiday-badge">${holiday}</span>` : `<span class="lunar-badge">${lunar}</span>`;
                
                let html = `<div class="font-semibold text-sm mb-1 flex items-center justify-between"><span>${dateStr.slice(5)}</span> ${label}</div>`;
                if (dayTrips.length === 0) {
                    html += `<div class="text-xs text-slate-300 text-center mt-8">無行程</div>`;
                } else {
                    html += dayTrips.map(t => `
                        <div onclick="event.stopImmediatePropagation(); openTripModal(${JSON.stringify(t).replace(/"/g,'&quot;')})" 
                             class="mb-1.5 px-2 py-1.5 rounded-xl text-xs" style="background:${t.color||'#4F97E9'}20; border-left:3px solid ${t.color||'#4F97E9'}">
                            <div class="font-medium">${t.title}</div>
                        </div>
                    `).join('');
                }
                cell.innerHTML = html;
                cell.onclick = () => { selectedDate = dateStr; showFloatingPanel(dateStr); };
                grid.appendChild(cell);
            });
        }

        function renderYearView(container) {
            const year = currentDate.getFullYear();
            document.getElementById('period-title').innerHTML = `${year} 年`;
            const wrapper = document.createElement('div');
            wrapper.className = 'grid grid-cols-3 md:grid-cols-4 gap-3';
            for (let m = 0; m < 12; m++) {
                const mini = document.createElement('div');
                mini.className = 'bg-white border border-[#E8E3FF] rounded-2xl p-3 cursor-pointer hover:shadow-md';
                mini.innerHTML = `<div class="font-semibold text-center text-sm">${MONTH_NAMES[m]}</div>`;
                mini.onclick = () => { currentDate = new Date(year, m, 1); switchView('month'); };
                wrapper.appendChild(mini);
            }
            container.appendChild(wrapper);
        }

        function showFloatingPanel(dateStr) {
            selectedDate = dateStr;
            const panel = document.createElement('div');
            panel.className = 'fixed inset-0 bg-black/40 z-50 flex justify-end';
            panel.innerHTML = `
                <div class="w-full md:w-[380px] h-full bg-white border-l flex flex-col shadow-2xl">
                    <div class="px-5 py-4 border-b flex justify-between items-center">
                        <div class="font-semibold text-lg">${dateStr}</div>
                        <button class="text-2xl text-slate-400 hover:text-red-500" onclick="this.closest('.fixed').remove()">×</button>
                    </div>
                    <div class="flex-1 p-5 overflow-y-auto">
                        <div class="text-center py-8 text-slate-400">完整浮動視窗功能後續補上<br>目前顯示日期：${dateStr}</div>
                    </div>
                    <div class="p-5 border-t bg-[#FFFCF2]">
                        <button onclick="this.closest('.fixed').remove(); openTripModal(null, '${dateStr}')" class="w-full py-3 text-white rounded-2xl text-sm font-semibold" style="background:#4F97E9;">
                            在此日期新增行程
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(panel);
        }

        function openTripModal(trip = null, prefillDate = null) {
            const modal = document.getElementById('trip-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            const form = document.getElementById('trip-form');
            form.reset();
            initColorPicker();

            if (trip) {
                editingTripId = trip.id;
                document.getElementById('modal-title').textContent = '編輯行程';
                document.getElementById('save-trip-btn').textContent = '更新行程';
                document.getElementById('trip-title').value = trip.title || '';
                document.getElementById('start-date').value = trip.startDate || '';
                document.getElementById('end-date').value = trip.endDate || '';
                document.getElementById('start-time').value = trip.startTime || '';
                document.getElementById('end-time').value = trip.endTime || '';
                document.getElementById('reminder').value = trip.reminder || '';
                document.getElementById('location').value = trip.location || '';
                document.getElementById('trip-url').value = trip.url || '';
                document.getElementById('trip-desc').value = trip.description || '';
            } else {
                editingTripId = null;
                document.getElementById('modal-title').textContent = '新增行程';
                document.getElementById('save-trip-btn').textContent = '儲存行程';
                const d = prefillDate || selectedDate || new Date().toISOString().split('T')[0];
                document.getElementById('start-date').value = d;
                document.getElementById('end-date').value = d;
            }
        }

        function closeTripModal() {
            document.getElementById('trip-modal').classList.remove('flex');
            document.getElementById('trip-modal').classList.add('hidden');
        }

        function initColorPicker() {
            const c = document.getElementById('color-picker');
            c.innerHTML = '';
            selectedColor = '#4F97E9';
            NEW_COLORS.forEach(col => {
                const s = document.createElement('div');
                s.className = `w-8 h-8 rounded-full cursor-pointer border-2 ${col === selectedColor ? 'ring-2 ring-offset-2 ring-[#4F97E9] scale-110' : ''}`;
                s.style.backgroundColor = col;
                s.onclick = () => {
                    c.querySelectorAll('div').forEach(x => x.classList.remove('ring-2','ring-offset-2','ring-[#4F97E9]','scale-110'));
                    s.classList.add('ring-2','ring-offset-2','ring-[#4F97E9]','scale-110');
                    selectedColor = col;
                };
                c.appendChild(s);
            });
        }

        function handleTripFormSubmit(e) {
            e.preventDefault();
            const title = document.getElementById('trip-title').value.trim();
            if (!title) return alert('請輸入行程標題');

            const data = {
                title,
                startDate: document.getElementById('start-date').value,
                endDate: document.getElementById('end-date').value || document.getElementById('start-date').value,
                startTime: document.getElementById('start-time').value || null,
                endTime: document.getElementById('end-time').value || null,
                reminder: document.getElementById('reminder').value || null,
                location: document.getElementById('location').value.trim(),
                url: document.getElementById('trip-url').value.trim(),
                description: document.getElementById('trip-desc').value.trim(),
                color: selectedColor,
                recurrence: currentRecurrence
            };

            if (editingTripId) {
                const idx = trips.findIndex(t => t.id === editingTripId);
                if (idx > -1) Object.assign(trips[idx], data);
            } else {
                trips.push({ id: 'trip_' + Date.now().toString(36), ...data });
            }
            saveToLocalStorage();
            closeTripModal();
            renderCurrentView();
        }

        function prevPeriod() {
            if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() - 1);
            else if (currentView === 'week') currentDate.setDate(currentDate.getDate() - 7);
            else currentDate.setFullYear(currentDate.getFullYear() - 1);
            renderCurrentView();
        }
        function nextPeriod() {
            if (currentView === 'month') currentDate.setMonth(currentDate.getMonth() + 1);
            else if (currentView === 'week') currentDate.setDate(currentDate.getDate() + 7);
            else currentDate.setFullYear(currentDate.getFullYear() + 1);
            renderCurrentView();
        }
        function goToday() {
            currentDate = new Date();
            selectedDate = new Date().toISOString().split('T')[0];
            if (currentView !== 'month') switchView('month');
            else renderCurrentView();
        }

        function renderUpcoming() {
            const c = document.getElementById('upcoming-list');
            const countEl = document.getElementById('upcoming-count');
            if (!c || !countEl) return;
            const today = new Date().toISOString().split('T')[0];
            const future = trips.filter(t => t.startDate >= today).sort((a,b) => a.startDate.localeCompare(b.startDate)).slice(0,6);
            countEl.textContent = future.length;
            if (future.length === 0) {
                c.innerHTML = `<div class="px-3 py-4 text-xs text-slate-400 text-center">未來沒有行程</div>`;
                return;
            }
            let html = '';
            future.forEach(t => {
                html += `<div class="px-3 py-2 hover:bg-slate-50 rounded-2xl cursor-pointer flex gap-3 text-sm">
                    <div class="w-2 h-2 mt-2 rounded-full" style="background:${t.color||'#4F97E9'}"></div>
                    <div class="flex-1 min-w-0"><div class="font-medium truncate">${t.title}</div><div class="text-xs text-slate-500">${t.startDate.slice(5)}</div></div>
                </div>`;
            });
            c.innerHTML = html;
        }

        function showAllTripsModal() {
            alert('所有行程列表（後續會改成從 Supabase 讀取）');
        }

        function showGoogleSyncModal() {
            alert('Google 同步功能開發中');
        }

        function openGoogleMaps() {
            const loc = document.getElementById('location').value.trim();
            if (!loc) return alert('請輸入地點');
            window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc)}`, '_blank');
        }

        function init() {
            loadFromLocalStorage();
            selectedDate = new Date().toISOString().split('T')[0];
            document.getElementById('btn-month').classList.add('active');
            renderCurrentView();
            renderUpcoming();
            checkUser();
            console.log('%c[我的行事曆 v9] Supabase 變數衝突已修正', 'color:#4F97E9');
        }

        window.onload = init;
    </script>
</body>
</html>
